<!doctype html>
<html lang="en">
  <head>
    <script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        fontFamily: {
          serif: ['"Playfair Display"', 'serif'],
          sans: ['"Inter"', 'sans-serif'],
        },
        colors: {
          ehyo: {
            bg: '#FBFAF6',
            text: '#2D2A26',
            coral: '#FF8FAB',
            indigo: '#6B7FD7',
            sage: '#A3B18A',
            dark: '#1a1a1a',
          }
        },
        animation: {
          'fade-in-up': 'fadeInUp 0.8s ease-out forwards',
          'float': 'float 6s ease-in-out infinite',
          'slide-in-right': 'slideInRight 0.4s ease-out forwards',
          'slide-in-left': 'slideInLeft 0.4s ease-out forwards',
        },
        keyframes: {
          fadeInUp: {
            '0%': { opacity: '0', transform: 'translateY(20px)' },
            '100%': { opacity: '1', transform: 'translateY(0)' },
          },
          float: {
            '0%, 100%': { transform: 'translateY(0)' },
            '50%': { transform: 'translateY(-20px)' },
          },
          slideInRight: {
            '0%': { transform: 'translateX(40px)' },
            '100%': { transform: 'translateX(0)' },
          },
          slideInLeft: {
            '0%': { transform: 'translateX(-40px)' },
            '100%': { transform: 'translateX(0)' },
          }
        }
      }
    }
  }
</script>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/EhYo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ehyo, train your language brain</title>
    <meta property="og:title" content="ehyo, train your language brain" />
    <meta name="description" content="train your language brain" />
    <meta property="og:description" content="train your language brain" />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        max-width: 100%;
        overflow-x: hidden;
      }
      #root {
        width: 100%;
        margin: 0;
        padding: 0;
      }
      @keyframes slideInRight {
        0% { transform: translateX(40px); }
        100% { transform: translateX(0); }
      }
      @keyframes slideInLeft {
        0% { transform: translateX(-40px); }
        100% { transform: translateX(0); }
      }
      .animate-slide-in-right {
        animation: slideInRight 0.35s ease-out both;
      }
      .animate-slide-in-left {
        animation: slideInLeft 0.35s ease-out both;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
